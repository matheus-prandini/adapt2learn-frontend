name: Build & Deploy on Main

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # 1) Checkout do código
      - name: Checkout repo
        uses: actions/checkout@v7

      # 2) Autentica no GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      # 3) Prepara o SDK do Google Cloud
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: adapt2learn-api

      # 4) Sincroniza todos os jogos de public/games do bucket para local
      - name: Sync all public/games from GCS
        run: |
          mkdir -p public/games
          gsutil -m rsync -r \
            gs://adapt2learn-api.firebasestorage.app/public/games \
            public/games

      # 5) Setup Node.js para build
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      # 6) Build do frontend
      - name: Install & Build frontend
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
        run: |
          npm ci
          npm run build

      # 7) Deploy no Firebase Hosting
      # firebase-tools direto (autentica via ADC exportado pelo
      # google-github-actions/auth -> GOOGLE_APPLICATION_CREDENTIALS).
      # Quando o build sai idêntico ao que já está no ar, o Firebase deduplica
      # a versao e recusa a release com 400 "is the current active version".
      # Isso NAO e uma falha real (nada mudou), entao engolimos SO esse erro
      # e propagamos qualquer outro.
      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          set -o pipefail
          set +e
          npx firebase-tools@^15 deploy --only hosting --project adapt2learn-api --non-interactive 2>&1 | tee deploy.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            if grep -q "is the current active version" deploy.log; then
              echo "::notice::Nada mudou desde a ultima publicacao; versao identica ja esta no ar. Tratando como sucesso."
              exit 0
            fi
            exit "$status"
          fi
